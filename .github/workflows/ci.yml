name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      # Live twitterapi.io probes are skipped without TWITTERAPI_IO_KEY,
      # so CI needs no secrets and makes no network calls.
      - name: Test
        run: pnpm test
